<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ciudades Activas | Club Hogga</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="container nav-container">
      <a href="/" class="logo"><img src="/images/logo.webp" alt="Club Hogga" style="height:32px; margin-right:8px; display:inline-block; vertical-align:middle;"><span class="logo-club">Club</span>hogga</a>
      <nav class="nav-links">
        <a href="/beneficios/">Beneficios</a>
        <a href="/ciudades/" class="text-primary font-bold">Ciudades</a>
        <a href="/faq/">Preguntas Frecuentes</a>
        <a href="/hazte-socio/" class="btn btn-primary" style="padding: 0.5rem 1rem;">Hazte Socio</a>
      </nav>
      <button class="mobile-menu-btn" aria-label="Abrir menú">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="24" height="24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16m-7 6h7"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="section">
    <div class="container text-center">
      <h1 style="font-size: 3rem; margin-bottom: var(--space-4);">Ciudades Activas</h1>
      <p class="text-muted text-lg max-w-2xl mx-auto" style="margin-bottom: var(--space-8);">El Club Hogga está creciendo. Conoce las ciudades donde ya puedes usar tus beneficios.</p>
      
      <div class="grid-3" style="max-width: 800px; margin: 0 auto;">
        
        <a href="/ciudades/puerto-varas/" class="card" style="align-items: center; justify-content: center; padding: var(--space-8); text-align: center;">
          <h2 style="font-size: 2rem; color: var(--text-main); margin-bottom: var(--space-2);">Puerto Varas</h2>
          <span class="chip">Ciudad Piloto</span>
          <p class="text-muted" style="margin-top: var(--space-4);">Explorar 12 beneficios activos &rarr;</p>
        </a>

        <div class="card" style="align-items: center; justify-content: center; padding: var(--space-8); text-align: center; background: var(--bg-main); border: 1px dashed var(--border-strong);">
          <h2 style="font-size: 1.5rem; color: var(--text-muted); margin-bottom: var(--space-2);">Puerto Montt</h2>
          <span class="chip" style="background: var(--border-light); color: var(--text-muted);">Próximamente</span>
        </div>

      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="/js/app.js"></script>
  <script defer src="/js/layout.js"></script>
</body>
</html>
