<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de OG Image | Club Hogga</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #e2e8f0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    p.instruction {
      margin-bottom: 20px;
      font-size: 18px;
      color: #334155;
      font-weight: 500;
    }

    /* Exact 1200x630 container for perfect OG Image ratio */
    .og-container {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0a2e46 0%, #104263 100%);
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      display: flex;
    }

    /* Abstract background shapes */
    .shape-1 {
      position: absolute;
      width: 800px;
      height: 800px;
      background: #108f8e;
      border-radius: 50%;
      top: -200px;
      right: -100px;
      opacity: 0.15;
      filter: blur(80px);
    }

    .shape-2 {
      position: absolute;
      width: 600px;
      height: 600px;
      background: #f6be32;
      border-radius: 50%;
      bottom: -300px;
      left: -200px;
      opacity: 0.15;
      filter: blur(60px);
    }

    .content-main {
      flex: 1.15;
      padding: 80px 80px 80px 90px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 10;
    }

    .pre-title {
      font-size: 25px;
      color: #94a3b8;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: -15px;
    }

    .title-mega {
      font-size: 155px;
      font-weight: 900;
      color: #f6be32;
      /* Amarillo para máximo contraste y foco */
      line-height: 1;
      letter-spacing: -6px;
      margin: 0 0 5px;
    }

    .title-mega span {
      font-size: 75px;
      color: #ffffff;
      letter-spacing: -2px;
      vertical-align: super;
      margin-left: 5px;
    }

    .subtitle-mega {
      font-size: 60px;
      color: #ffffff;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin: 0 0 15px;
    }

    .third-title {
      font-size: 32px;
      color: #a5c3d8;
      font-weight: 500;
      margin: 0 0 60px;
    }

    .logo-bottom {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-bottom img {
      height: 55px;
    }

    .logo-bottom span {
      font-size: 46px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -1.5px;
    }

    .social-proof-divider {
      width: 2px;
      height: 45px;
      background: rgba(255, 255, 255, 0.2);
      margin: 0 15px;
    }

    .social-proof {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stars {
      color: #f6be32;
      font-size: 22px;
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .proof-text {
      color: #cbd5e1;
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .content-cards {
      flex: 0.85;
      position: relative;
      z-index: 10;
    }

    /* Floating mockups/cards */
    .mockup-card {
      position: absolute;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 32px;
      padding: 35px 40px;
      box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.5);
      width: 310px;
    }

    .card-1 {
      top: 50px;
      right: 70px;
      transform: rotate(6deg);
      z-index: 2;
    }

    .card-2 {
      bottom: 60px;
      right: 170px;
      transform: rotate(-4deg);
      z-index: 3;
    }

    .card-icon {
      font-size: 65px;
      margin-bottom: 12px;
      line-height: 1;
    }

    .card-title {
      font-size: 32px;
      font-weight: 800;
      color: #0a2e46;
      margin: 0 0 5px;
      letter-spacing: -1px;
    }

    .card-discount {
      font-size: 55px;
      font-weight: 900;
      color: #108f8e;
      /* Teal para variar del rojo chillón y dar seriedad */
      margin: 0;
      letter-spacing: -2px;
    }

    .card-label {
      font-size: 26px;
      color: #64748b;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-left: 5px;
    }
  </style>
</head>

<body>

  <p class="instruction">Haz una captura de pantalla EXACTA del rectángulo azul de abajo (1200x630 píxeles).</p>

  <div class="og-container">
    <div class="shape-1"></div>
    <div class="shape-2"></div>

    <div class="content-main">
      <!-- Huge Hook UI/UX -->
      <div class="pre-title">Hasta</div>
      <h1 class="title-mega">25% <span>DSCTO</span></h1>
      <h2 class="subtitle-mega">en tu ciudad.</h2>
      <p class="third-title">en servicios, comida y más.</p>

      <!-- Trust Factor Bottom -->
      <div class="logo-bottom">
        <img src="/images/logo.png" alt="Club Hogga Logo" onerror="this.src='https://club.hogga.cl/images/logo.png'">
        <span>Clubhogga</span>
        <div class="social-proof-divider"></div>
        <div class="social-proof">
          <div class="stars">★★★★★</div>
          <div class="proof-text">La red local</div>
        </div>
      </div>
    </div>

    <!-- Right Side Cards -->
    <div class="content-cards">
      <!-- Card 1 -->
      <div class="mockup-card card-1">
        <div class="card-icon">🍔</div>
        <h3 class="card-title">Gastronomía</h3>
        <p class="card-discount">20% <span class="card-label">OFF</span></p>
      </div>

      <!-- Card 2 -->
      <div class="mockup-card card-2">
        <div class="card-icon">💇‍♀️</div>
        <h3 class="card-title">Estética</h3>
        <p class="card-discount">25% <span class="card-label">OFF</span></p>
      </div>
    </div>
  </div>

</body>

</html>
